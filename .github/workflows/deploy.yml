name: Deploy Trace

on:
  push:
    branches:
      - main

concurrency:
  group: trace-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -e

            cd /var/www/trace

            git fetch origin
            git reset --hard origin/main

            npm ci
            npm run build

            pm2 restart trace
