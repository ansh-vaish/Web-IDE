<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="90" cy="90" r="65" fill="url(#glow)"/>

  <!-- Main Workspace Frame -->
  <rect
    x="40"
    y="45"
    width="100"
    height="80"
    rx="18"
    fill="#09090B"
    stroke="rgba(255,255,255,0.15)"
  />

  <!-- Header -->
  <line
    x1="40"
    y1="65"
    x2="140"
    y2="65"
    stroke="rgba(255,255,255,0.1)"
  />

  <!-- Window Controls -->
  <circle cx="55" cy="55" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="65" cy="55" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="75" cy="55" r="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Sidebar -->
  <rect
    x="48"
    y="72"
    width="20"
    height="45"
    rx="6"
    fill="rgba(255,255,255,0.04)"
  />

  <!-- Editor Lines -->
  <line x1="80" y1="82" x2="125" y2="82" stroke="white" stroke-opacity="0.45"/>
  <line x1="80" y1="92" x2="118" y2="92" stroke="white" stroke-opacity="0.3"/>
  <line x1="80" y1="102" x2="130" y2="102" stroke="white" stroke-opacity="0.2"/>

  <!-- Center Plus -->
  <circle
    cx="90"
    cy="140"
    r="16"
    fill="#09090B"
    stroke="rgba(255,255,255,0.2)"
  />

  <line
    x1="90"
    y1="133"
    x2="90"
    y2="147"
    stroke="white"
    stroke-width="2"
    stroke-linecap="round"
  />

  <line
    x1="83"
    y1="140"
    x2="97"
    y2="140"
    stroke="white"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Connection Lines -->
  <line
    x1="90"
    y1="125"
    x2="90"
    y2="114"
    stroke="white"
    stroke-opacity="0.12"
    stroke-dasharray="4 4"
  />

  <!-- Floating Nodes -->
  <circle cx="28" cy="90" r="4" fill="#18181B" stroke="rgba(255,255,255,0.15)"/>
  <circle cx="152" cy="90" r="4" fill="#18181B" stroke="rgba(255,255,255,0.15)"/>
  <circle cx="90" cy="25" r="4" fill="#18181B" stroke="rgba(255,255,255,0.15)"/>

  <!-- Blueprint Orbit -->
  <circle
    cx="90"
    cy="90"
    r="75"
    stroke="white"
    stroke-opacity="0.06"
    stroke-dasharray="5 8"
  />

</svg>